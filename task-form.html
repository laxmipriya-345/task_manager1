<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Form</title>
    <link rel="stylesheet" href="styles/style.css">
    <link rel="stylesheet" href="styles/task-form.css">
</head>
<body>
    <form class="task-form" id="taskForm">
        <div class="form-group">
            <label for="task-title">Task Title</label>
            <input type="text" id="task-title" placeholder="Enter task title" required>
        </div>
        
        <div class="form-group">
            <label for="task-description">Description</label>
            <textarea id="task-description" rows="4" placeholder="Describe your task..."></textarea>
        </div>
        
        <div class="form-row">
            <div class="form-group">
                <label for="task-priority">Priority</label>
                <select id="task-priority">
                    <option value="low">Low</option>
                    <option value="medium" selected>Medium</option>
                    <option value="high">High</option>
                </select>
            </div>
            
            <div class="form-group">
                <label for="task-status">Status</label>
                <select id="task-status">
                    <option value="todo">To Do</option>
                    <option value="in-progress">In Progress</option>
                    <option value="completed">Completed</option>
                </select>
            </div>
        </div>
        
        <div class="form-row">
            <div class="form-group">
                <label for="task-due-date">Due Date</label>
                <input type="date" id="task-due-date">
            </div>
            
            <div class="form-group">
                <label for="task-assignee">Assignee</label>
                <input type="text" id="task-assignee" placeholder="Assign to...">
            </div>
        </div>
        
        <div class="form-group">
            <label for="task-tags">Tags</label>
            <input type="text" id="task-tags" placeholder="Enter tags (comma separated)">
        </div>
        
        <div class="form-actions">
            <button type="button" class="btn-secondary" onclick="closeTaskForm()">Cancel</button>
            <button type="submit" class="btn-primary">Create Task</button>
        </div>
    </form>
</body>
</html>
