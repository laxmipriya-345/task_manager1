<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Task Manager</title>
    <link rel="stylesheet" href="styles/style.css">
    <link rel="stylesheet" href="styles/login.css">
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <h1>📋 Task Manager</h1>
                <p>Welcome back! Please login to your account</p>
            </div>
            
            <!-- Added id="loginForm" and onsubmit handler -->
            <form class="login-form" id="loginForm" onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" placeholder="Enter your email" value="demo@dreamtravel.com" required>
                </div>
                
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="Enter your password" value="password123" required>
                </div>
                
                <div class="form-options">
                    <label class="remember-me">
                        <input type="checkbox"> Remember me
                    </label>
                    <a href="#" class="forgot-password">Forgot password?</a>
                </div>
                
                <button type="submit" class="btn-primary">Login</button>
            </form>
            
            <!-- Added error message display -->
            <div id="errorMessage" style="color: #dc2626; text-align: center; margin-top: 12px; display: none;"></div>
            
            <p class="signup-link">
                Don't have an account? <a href="signup.html">Sign up</a>
            </p>
        </div>
    </div>

    <script>
        function handleLogin(event) {
            event.preventDefault(); // Prevent form from submitting
            
            // Get input values
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const errorDiv = document.getElementById('errorMessage');
            
            // Demo credentials (you can change these)
            const validEmail = 'demo@dreamtravel.com';
            const validPassword = 'password123';
            
            // Validation
            if (email === validEmail && password === validPassword) {
                // Success - redirect to dashboard
                errorDiv.style.display = 'none';
                alert('✅ Login successful! Redirecting to dashboard...');
                window.location.href = 'dashboard.html';
            } else {
                // Show error message
                errorDiv.style.display = 'block';
                if (email !== validEmail && password !== validPassword) {
                    errorDiv.textContent = '❌ Invalid email and password. Try: demo@dreamtravel.com / password123';
                } else if (email !== validEmail) {
                    errorDiv.textContent = '❌ Invalid email. Use: demo@dreamtravel.com';
                } else {
                    errorDiv.textContent = '❌ Invalid password. Use: password123';
                }
            }
        }

        // Optional: Add Enter key support
        document.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                const form = document.getElementById('loginForm');
                if (form) {
                    form.dispatchEvent(new Event('submit'));
                }
            }
        });
    </script>
</body>
</html>
